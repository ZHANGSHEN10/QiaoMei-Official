<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘記密碼 - 喬美卡巴拉島</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --accent: #f59e0b;
            --dark: #0f172a;
            --dark-light: #1e293b;
            --dark-lighter: #334155;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 0;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
            font-weight: 900;
            text-decoration: none;
            color: var(--text);
        }

        .logo-icon {
            color: var(--accent);
            font-size: 28px;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 10px var(--accent); }
            50% { text-shadow: 0 0 30px var(--accent), 0 0 50px var(--accent); }
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .back-btn:hover {
            color: var(--primary-light);
        }

        .forgot-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .forgot-box {
            background: var(--dark-light);
            border-radius: 20px;
            padding: 50px 40px;
            width: 100%;
            max-width: 500px;
            border: 1px solid var(--dark-lighter);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .forgot-box::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, transparent 50%);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .forgot-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 25px;
            background: var(--gradient-1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: white;
            animation: float 3s ease-in-out infinite;
            position: relative;
            z-index: 1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .forgot-title {
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 15px;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            z-index: 1;
        }

        .forgot-subtitle {
            color: var(--text-muted);
            margin-bottom: 35px;
            line-height: 1.6;
            position: relative;
            z-index: 1;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
            position: relative;
            z-index: 1;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-muted);
        }

        .form-group .input-icon {
            position: relative;
        }

        .form-group .input-icon i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .form-group input {
            width: 100%;
            padding: 15px 20px 15px 45px;
            border-radius: 12px;
            border: 1px solid var(--dark-lighter);
            background: var(--dark);
            color: var(--text);
            font-size: 16px;
            font-family: 'Noto Sans TC', sans-serif;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            border: none;
            background: var(--gradient-1);
            color: white;
            font-size: 18px;
            font-weight: 700;
            font-family: 'Noto Sans TC', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            position: relative;
            z-index: 1;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .success-message {
            display: none;
            position: relative;
            z-index: 1;
        }

        .success-message.show {
            display: block;
        }

        .success-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 25px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            color: white;
            animation: scaleIn 0.5s ease;
        }

        @keyframes scaleIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .success-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #10b981;
        }

        .success-text {
            color: var(--text-muted);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .back-link {
            text-align: center;
            margin-top: 30px;
            color: var(--text-muted);
            position: relative;
            z-index: 1;
        }

        .back-link a {
            color: var(--primary-light);
            text-decoration: none;
            font-weight: 500;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .footer {
            background: var(--dark);
            border-top: 1px solid var(--dark-lighter);
            padding: 20px 0;
            text-align: center;
        }

        .footer-content {
            color: var(--text-muted);
            font-size: 14px;
        }

        @media (max-width: 480px) {
            .forgot-box {
                padding: 30px 20px;
            }
            
            .forgot-title {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">✦</span>
                <span>喬美卡巴拉島</span>
            </a>
            <a href="login.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
                返回登入
            </a>
        </div>
    </nav>

    <div class="forgot-container">
        <div class="forgot-box">
            <div id="formContent">
                <div class="forgot-icon">
                    <i class="fas fa-key"></i>
                </div>
                <h1 class="forgot-title">忘記密碼</h1>
                <p class="forgot-subtitle">別擔心！我們會寄送密碼重設連結到您的電子郵件</p>

                <form id="forgotForm">
                    <div class="form-group">
                        <label>帳號</label>
                        <div class="input-icon">
                            <i class="fas fa-user"></i>
                            <input type="text" name="username" placeholder="請輸入帳號" required>
                        </div>
                    </div>
                    <button type="submit" class="submit-btn">發送重設連結</button>
                </form>

                <p class="back-link">
                    想起密碼了？ <a href="login.html">立即登入</a>
                </p>
            </div>

            <div id="successMessage" class="success-message">
                <div class="success-icon">
                    <i class="fas fa-check"></i>
                </div>
                <h2 class="success-title">發送成功！</h2>
                <p class="success-text">密碼重設連結已發送到您的電子郵件<br>請檢查收件匣並點擊連結進行重設</p>
                <button class="submit-btn" onclick="window.location.href='login.html'">返回登入</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-content">
            © 2026 喬美卡巴拉島. All Rights Reserved.
        </div>
    </footer>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const form = e.target;
            const username = form.username.value;
            
            const btn = form.querySelector('.submit-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 發送中...';
            
            const apiUrl = 'https://game-backend-20jn.onrender.com';
            
            try {
                const response = await fetch(`${apiUrl}/api/forgot-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('formContent').style.display = 'none';
                    document.getElementById('successMessage').classList.add('show');
                } else {
                    alert('發送失敗：' + data.error);
                }
            } catch (error) {
                alert('連線錯誤，請稍後再試');
            }
            
            btn.disabled = false;
            btn.textContent = '發送重設連結';
        });
    </script>
</body>
</html>
