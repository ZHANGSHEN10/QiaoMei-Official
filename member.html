<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員專區 - 喬美卡巴拉島</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --accent: #f59e0b;
            --dark: #0f172a;
            --dark-light: #1e293b;
            --dark-lighter: #334155;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --success: #10b981;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
        }

        .navbar {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
            font-weight: 900;
            text-decoration: none;
            color: var(--text);
        }

        .logo-icon {
            color: var(--accent);
            font-size: 28px;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 10px var(--accent); }
            50% { text-shadow: 0 0 30px var(--accent), 0 0 50px var(--accent); }
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 30px;
            align-items: center;
        }

        .nav-menu a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-menu a:hover,
        .nav-menu a.active {
            color: var(--primary-light);
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--gradient-1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
        }

        .user-name {
            font-weight: 500;
        }

        .logout-btn {
            padding: 8px 20px;
            border-radius: 8px;
            background: transparent;
            border: 1px solid var(--dark-lighter);
            color: var(--text-muted);
            cursor: pointer;
            font-family: 'Noto Sans TC', sans-serif;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            border-color: var(--secondary);
            color: var(--secondary);
        }

        .member-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .welcome-section {
            background: var(--dark-light);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            border: 1px solid var(--dark-lighter);
            position: relative;
            overflow: hidden;
        }

        .welcome-section::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, transparent 50%);
        }

        .welcome-title {
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 10px;
            position: relative;
        }

        .welcome-title span {
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .welcome-subtitle {
            color: var(--text-muted);
            font-size: 16px;
            position: relative;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--dark-light);
            border-radius: 16px;
            padding: 30px;
            border: 1px solid var(--dark-lighter);
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .stat-icon.purple {
            background: rgba(99, 102, 241, 0.2);
            color: var(--primary-light);
        }

        .stat-icon.pink {
            background: rgba(236, 72, 153, 0.2);
            color: var(--secondary);
        }

        .stat-icon.gold {
            background: rgba(245, 158, 11, 0.2);
            color: var(--accent);
        }

        .stat-icon.green {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .stat-value {
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 5px;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 14px;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
        }

        .main-content {
            background: var(--dark-light);
            border-radius: 16px;
            padding: 30px;
            border: 1px solid var(--dark-lighter);
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title i {
            color: var(--primary-light);
        }

        .activity-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .activity-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: var(--dark);
            border-radius: 12px;
            border: 1px solid var(--dark-lighter);
        }

        .activity-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .activity-icon.register {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .activity-icon.login {
            background: rgba(99, 102, 241, 0.2);
            color: var(--primary-light);
        }

        .activity-info {
            flex: 1;
        }

        .activity-title {
            font-weight: 500;
            margin-bottom: 3px;
        }

        .activity-time {
            font-size: 12px;
            color: var(--text-muted);
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar-card {
            background: var(--dark-light);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid var(--dark-lighter);
        }

        .sidebar-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--text-muted);
        }

        .quick-links {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .quick-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            background: var(--dark);
            border-radius: 10px;
            text-decoration: none;
            color: var(--text);
            transition: all 0.3s;
        }

        .quick-link:hover {
            background: var(--dark-lighter);
            transform: translateX(5px);
        }

        .quick-link i {
            color: var(--primary-light);
            width: 20px;
        }

        .vip-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
        }

        .login-prompt {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }

        .login-prompt-icon {
            width: 100px;
            height: 100px;
            background: var(--gradient-1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin-bottom: 30px;
        }

        .login-prompt h2 {
            font-size: 28px;
            margin-bottom: 15px;
        }

        .login-prompt p {
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        .login-prompt-btns {
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            font-family: 'Noto Sans TC', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--gradient-1);
            border: none;
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--dark-lighter);
            color: var(--text);
        }

        .btn-secondary:hover {
            border-color: var(--primary-light);
        }

        .hidden {
            display: none !important;
        }

        .footer {
            background: var(--dark);
            border-top: 1px solid var(--dark-lighter);
            padding: 20px 0;
            text-align: center;
            margin-top: 60px;
        }

        .footer-content {
            color: var(--text-muted);
            font-size: 14px;
        }

        @media (max-width: 480px) {
            .nav-menu {
                display: none;
            }
            
            .welcome-title {
                font-size: 24px;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">✦</span>
                <span>喬美卡巴拉島</span>
            </a>
            <ul class="nav-menu">
                <li><a href="index.html">首頁</a></li>
                <li><a href="member.html" class="active">會員專區</a></li>
            </ul>
            <div class="user-menu" id="userMenu">
                <div class="user-avatar" id="userAvatar">?</div>
                <span class="user-name" id="userName">訪客</span>
                <button class="logout-btn" id="logoutBtn">登出</button>
            </div>
        </div>
    </nav>

    <div id="loggedInContent">
        <div class="member-container">
            <div class="welcome-section">
                <h1 class="welcome-title">歡迎回來，<span id="welcomeName">冒險者</span>！</h1>
                <p class="welcome-subtitle">感謝您加入喬美卡巴拉島，祝您遊戲愉快！</p>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon purple">
                        <i class="fas fa-calendar-check"></i>
                    </div>
                    <div class="stat-value" id="memberDays">0</div>
                    <div class="stat-label">會員天數</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon pink">
                        <i class="fas fa-gamepad"></i>
                    </div>
                    <div class="stat-value">0</div>
                    <div class="stat-label">遊戲時數</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon gold">
                        <i class="fas fa-trophy"></i>
                    </div>
                    <div class="stat-value">0</div>
                    <div class="stat-label">成就數</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon green">
                        <i class="fas fa-star"></i>
                    </div>
                    <div class="stat-value">
                        <span class="vip-badge"><i class="fas fa-crown"></i> VIP</span>
                    </div>
                    <div class="stat-label">會員等級</div>
                </div>
            </div>

            <div class="content-grid">
                <div class="main-content">
                    <h3 class="section-title"><i class="fas fa-history"></i> 最近活動</h3>
                    <div class="activity-list" id="activityList">
                        <div class="activity-item">
                            <div class="activity-icon register">
                                <i class="fas fa-user-plus"></i>
                            </div>
                            <div class="activity-info">
                                <div class="activity-title">帳號註冊</div>
                                <div class="activity-time" id="registerTime">載入中...</div>
                            </div>
                        </div>
                        <div class="activity-item">
                            <div class="activity-icon login">
                                <i class="fas fa-sign-in-alt"></i>
                            </div>
                            <div class="activity-info">
                                <div class="activity-title">上次登入</div>
                                <div class="activity-time" id="lastLogin">剛剛</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="sidebar">
                    <div class="sidebar-card">
                        <h4 class="sidebar-title">快速連結</h4>
                        <div class="quick-links">
                            <a href="game-account.html" class="quick-link"><i class="fas fa-gamepad"></i> 遊戲帳號</a>
                            <a href="#" class="quick-link"><i class="fas fa-user-cog"></i> 帳號設定</a>
                            <a href="#" class="quick-link"><i class="fas fa-shield-alt"></i> 安全性</a>
                            <a href="forgot-password.html" class="quick-link"><i class="fas fa-key"></i> 變更密碼</a>
                            <a href="#" class="quick-link"><i class="fas fa-question-circle"></i> 客服中心</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="loggedOutContent" class="hidden">
        <div class="login-prompt">
            <div class="login-prompt-icon">
                <i class="fas fa-user-lock"></i>
            </div>
            <h2>登入會員專區</h2>
            <p>登入後即可查看您的會員資訊、遊戲紀錄等</p>
            <div class="login-prompt-btns">
                <a href="login.html" class="btn btn-primary">立即登入</a>
                <a href="register.html" class="btn btn-secondary">註冊帳號</a>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-content">
            © 2026 喬美卡巴拉島. All Rights Reserved.
        </div>
    </footer>

    <script>
        const apiUrl = 'https://game-backend-20jn.onrender.com';

        function checkLogin() {
            const userData = localStorage.getItem('user');
            
            if (userData) {
                const user = JSON.parse(userData);
                document.getElementById('loggedInContent').classList.remove('hidden');
                document.getElementById('loggedOutContent').classList.add('hidden');
                
                const username = user.username || user.email.split('@')[0];
                document.getElementById('welcomeName').textContent = username;
                document.getElementById('userName').textContent = username;
                document.getElementById('userAvatar').textContent = username.charAt(0).toUpperCase();
                
                const now = new Date();
                document.getElementById('memberDays').textContent = Math.floor((now.getTime() - now.getTime()) / (1000 * 60 * 60 * 24)) + 1;
            } else {
                document.getElementById('loggedInContent').classList.add('hidden');
                document.getElementById('loggedOutContent').classList.remove('hidden');
            }
        }

        document.getElementById('logoutBtn').addEventListener('click', function() {
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        });

        checkLogin();
    </script>
</body>
</html>
