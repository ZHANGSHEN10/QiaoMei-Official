<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系統狀態 - 喬美卡巴拉島</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6366f1; --primary-light: #818cf8;
            --secondary: #ec4899; --accent: #f59e0b;
            --dark: #0f172a; --dark-light: #1e293b;
            --dark-lighter: #334155; --text: #f8fafc;
            --text-muted: #94a3b8;
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --success: #10b981; --error: #ef4444; --warning: #f59e0b;
        }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; }
        .navbar { background: rgba(15,23,42,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); padding: 15px 0; position: sticky; top: 0; z-index: 100; }
        .nav-container { max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 24px; font-weight: 900; text-decoration: none; color: var(--text); }
        .logo-icon { color: var(--accent); font-size: 28px; }
        .status-container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        .status-header { text-align: center; margin-bottom: 40px; }
        .status-title { font-size: 36px; font-weight: 900; margin-bottom: 10px; }
        .status-title span { background: var(--gradient-1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .last-updated { color: var(--text-muted); font-size: 14px; }
        .overall-status { background: var(--dark-light); border-radius: 20px; padding: 30px; margin-bottom: 30px; border: 1px solid var(--dark-lighter); display: flex; align-items: center; justify-content: center; gap: 20px; }
        .overall-icon { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; }
        .overall-icon.online { background: rgba(16,185,129,0.2); color: var(--success); }
        .overall-icon.offline { background: rgba(239,68,68,0.2); color: var(--error); }
        .overall-icon.checking { background: rgba(245,158,11,0.2); color: var(--warning); }
        .overall-text { font-size: 24px; font-weight: 700; }
        .overall-text.online { color: var(--success); }
        .overall-text.offline { color: var(--error); }
        .overall-text.checking { color: var(--warning); }
        .services-grid { display: grid; gap: 15px; }
        .service-card { background: var(--dark-light); border-radius: 16px; padding: 20px; border: 1px solid var(--dark-lighter); display: flex; align-items: center; justify-content: space-between; }
        .service-info { display: flex; align-items: center; gap: 15px; }
        .service-icon { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .service-icon.website { background: rgba(99,102,241,0.2); color: var(--primary-light); }
        .service-icon.api { background: rgba(236,72,153,0.2); color: var(--secondary); }
        .service-icon.database { background: rgba(245,158,11,0.2); color: var(--accent); }
        .service-icon.auth { background: rgba(16,185,129,0.2); color: var(--success); }
        .service-name { font-weight: 700; font-size: 16px; }
        .service-desc { font-size: 13px; color: var(--text-muted); }
        .service-status { padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; }
        .service-status.online { background: rgba(16,185,129,0.2); color: var(--success); }
        .service-status.offline { background: rgba(239,68,68,0.2); color: var(--error); }
        .service-status.checking { background: rgba(245,158,11,0.2); color: var(--warning); }
        .service-status.loading { background: rgba(245,158,11,0.2); color: var(--warning); }
        .footer { background: var(--dark); border-top: 1px solid var(--dark-lighter); padding: 20px 0; text-align: center; margin-top: 60px; }
        .footer-content { color: var(--text-muted); font-size: 14px; }
        @media (max-width: 480px) { .status-title { font-size: 28px; } .service-card { flex-direction: column; gap: 15px; text-align: center; } .service-info { flex-direction: column; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="https://qiaomei.netlify.app" class="logo"><span class="logo-icon">✦</span><span>喬美卡巴拉島</span></a>
        </div>
    </nav>
    <div class="status-container">
        <div class="status-header">
            <h1 class="status-title">系統<span>狀態</span></h1>
            <p class="last-updated">最後更新：<span id="lastUpdated">載入中...</span></p>
            <p style="margin-top: 10px; font-size: 14px; color: var(--warning);">此頁面為官方網站系統狀態，並非伺服器運行狀態</p>
            <p style="margin-top: 5px; font-size: 14px; color: var(--text-muted);">伺服器有無開啟請至Discord <a href="https://discord.com/channels/1426946931950882888/1429586582377074729" target="_blank" style="color: var(--primary-light); text-decoration: none;">🟣➛【＃運行狀態】</a> 查看</p>
        </div>
        <div class="overall-status">
            <div class="overall-icon checking" id="overallIcon"><i class="fas fa-spinner fa-spin"></i></div>
            <div class="overall-text checking" id="overallText">檢查中...</div>
        </div>
        <div class="services-grid">
            <div class="service-card">
                <div class="service-info">
                    <div class="service-icon website"><i class="fas fa-globe"></i></div>
                    <div>
                        <div class="service-name">官方網站</div>
                        <div class="service-desc">qiaomei.netlify.app</div>
                    </div>
                </div>
                <div class="service-status loading" id="statusWebsite">檢查中</div>
            </div>
            <div class="service-card">
                <div class="service-info">
                    <div class="service-icon api"><i class="fas fa-server"></i></div>
                    <div>
                        <div class="service-name">後端 API</div>
                        <div class="service-desc">game-backend.onrender.com</div>
                    </div>
                </div>
                <div class="service-status loading" id="statusAPI">檢查中</div>
            </div>
            <div class="service-card">
                <div class="service-info">
                    <div class="service-icon database"><i class="fas fa-database"></i></div>
                    <div>
                        <div class="service-name">資料庫</div>
                        <div class="service-desc">Firebase Firestore</div>
                    </div>
                </div>
                <div class="service-status loading" id="statusDatabase">檢查中</div>
            </div>
            <div class="service-card">
                <div class="service-info">
                    <div class="service-icon auth"><i class="fas fa-user-shield"></i></div>
                    <div>
                        <div class="service-name">會員系統</div>
                        <div class="service-desc">Firebase Authentication</div>
                    </div>
                </div>
                <div class="service-status loading" id="statusAuth">檢查中</div>
            </div>
        </div>
    </div>
    <footer class="footer"><div class="footer-content">© 2026 喬美卡巴拉島. All Rights Reserved.</div></footer>
    <script>
        const apiUrl = 'https://game-backend-20jn.onrender.com';
        let onlineCount = 0;
        let totalCount = 4;
        function updateStatus(id, status, text) {
            const el = document.getElementById(id);
            el.className = 'service-status ' + status;
            el.textContent = text;
            if (status === 'online') onlineCount++;
        }
        async function checkWebsite() {
            try {
                const response = await fetch('https://qiaomei.netlify.app', { method: 'HEAD' });
                if (response.ok || response.status === 404) {
                    updateStatus('statusWebsite', 'online', '正常');
                } else {
                    updateStatus('statusWebsite', 'offline', '異常');
                }
            } catch (e) {
                updateStatus('statusWebsite', 'offline', '異常');
            }
        }
        async function checkAPI() {
            try {
                const response = await fetch(`${apiUrl}/api/test`, { method: 'GET' });
                if (response.ok) {
                    const data = await response.json();
                    if (data.status === 'success') {
                        updateStatus('statusAPI', 'online', '正常');
                    } else {
                        updateStatus('statusAPI', 'offline', '異常');
                    }
                } else {
                    updateStatus('statusAPI', 'offline', '異常');
                }
            } catch (e) {
                updateStatus('statusAPI', 'offline', '異常');
            }
        }
        async function checkDatabase() {
            try {
                const response = await fetch(`${apiUrl}/api/test`, { method: 'GET' });
                if (response.ok) {
                    updateStatus('statusDatabase', 'online', '正常');
                } else {
                    updateStatus('statusDatabase', 'offline', '異常');
                }
            } catch (e) {
                updateStatus('statusDatabase', 'offline', '異常');
            }
        }
        async function checkAuth() {
            try {
                const response = await fetch(`${apiUrl}/api/test`, { method: 'GET' });
                if (response.ok) {
                    updateStatus('statusAuth', 'online', '正常');
                } else {
                    updateStatus('statusAuth', 'offline', '異常');
                }
            } catch (e) {
                updateStatus('statusAuth', 'offline', '異常');
            }
        }
        async function checkAll() {
            await Promise.all([checkWebsite(), checkAPI(), checkDatabase(), checkAuth()]);
            const overallIcon = document.getElementById('overallIcon');
            const overallText = document.getElementById('overallText');
            if (onlineCount === totalCount) {
                overallIcon.className = 'overall-icon online';
                overallIcon.innerHTML = '<i class="fas fa-check"></i>';
                overallText.className = 'overall-text online';
                overallText.textContent = '所有服務正常';
            } else if (onlineCount > 0) {
                overallIcon.className = 'overall-icon warning';
                overallIcon.innerHTML = '<i class="fas fa-exclamation-triangle"></i>';
                overallText.className = 'overall-text checking';
                overallText.textContent = '部分服務異常';
            } else {
                overallIcon.className = 'overall-icon offline';
                overallIcon.innerHTML = '<i class="fas fa-times"></i>';
                overallText.className = 'overall-text offline';
                overallText.textContent = '服務異常';
            }
            const now = new Date();
            const time = now.getHours().toString().padStart(2, '0') + ':' + 
                       now.getMinutes().toString().padStart(2, '0') + ':' + 
                       now.getSeconds().toString().padStart(2, '0');
            document.getElementById('lastUpdated').textContent = time;
        }
        function updateTime() {
            const now = new Date();
            const time = now.getHours().toString().padStart(2, '0') + ':' + 
                       now.getMinutes().toString().padStart(2, '0') + ':' + 
                       now.getSeconds().toString().padStart(2, '0');
            const el = document.getElementById('lastUpdated');
            if (el) el.textContent = time;
        }
        updateTime();
        setInterval(updateTime, 1000);
        checkAll();
        setInterval(checkAll, 30000);
    </script>
</body>
</html>
