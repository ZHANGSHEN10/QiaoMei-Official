<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>註冊管理 - 喬美卡巴拉島</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6366f1;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --dark: #0f172a;
            --dark-light: #1e293b;
            --dark-lighter: #334155;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--dark-lighter);
        }
        .header h1 { font-size: 28px; }
        .header h1 span { color: var(--primary); }
        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: var(--dark-light);
            border-radius: 50px;
            font-size: 14px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }
        .status-dot.offline { background: var(--error); animation: none; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--dark-light);
            border-radius: 16px;
            padding: 25px;
            text-align: center;
        }
        .stat-value { font-size: 36px; font-weight: 900; color: var(--primary); }
        .stat-label { color: var(--text-muted); margin-top: 5px; }
        .terminal {
            background: #0d1117;
            border-radius: 12px;
            padding: 20px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            height: 400px;
            overflow-y: auto;
            border: 1px solid var(--dark-lighter);
        }
        .terminal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--dark-lighter);
        }
        .terminal-title { color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
        .terminal-title i { color: var(--success); }
        .log-entry {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            gap: 15px;
        }
        .log-time { color: var(--text-muted); min-width: 180px; }
        .log-user { color: var(--primary); min-width: 120px; }
        .log-ip { color: var(--warning); }
        .log-new {
            background: rgba(16, 185, 129, 0.1);
            animation: flash 1s ease-out;
        }
        @keyframes flash {
            from { background: rgba(16, 185, 129, 0.3); }
            to { background: rgba(16, 185, 129, 0.1); }
        }
        .refresh-btn {
            padding: 8px 20px;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s;
        }
        .refresh-btn:hover { background: #4f46e5; }
        .empty { color: var(--text-muted); text-align: center; padding: 50px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 <span>註冊記錄</span> 管理</h1>
            <div class="status">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">連線中...</span>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalCount">0</div>
                <div class="stat-label">總註冊人數</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="todayCount">0</div>
                <div class="stat-label">今日註冊</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="uniqueIpCount">0</div>
                <div class="stat-label">不同 IP</div>
            </div>
        </div>

        <div class="terminal">
            <div class="terminal-header">
                <div class="terminal-title">
                    <i class="fas fa-terminal"></i> 即時日誌
                </div>
                <button class="refresh-btn" onclick="fetchData()">
                    <i class="fas fa-sync-alt"></i> 刷新
                </button>
            </div>
            <div id="logContainer">
                <div class="empty">載入中...</div>
            </div>
        </div>
    </div>

    <script>
        const apiUrl = 'https://game-backend-20jn.onrender.com';
        let registrations = [];
        let isOnline = true;

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const now = new Date();
            const isToday = date.toDateString() === now.toDateString();
            
            const time = date.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            if (isToday) {
                return `今天 ${time}`;
            }
            return date.toLocaleDateString('zh-TW', { month: 'short', day: 'numeric' }) + ' ' + time;
        }

        function updateStats() {
            const today = new Date().toDateString();
            const todayRegs = registrations.filter(r => {
                if (!r.createdAt) return false;
                return new Date(r.createdAt).toDateString() === today;
            });
            
            const uniqueIps = [...new Set(registrations.map(r => r.ip).filter(ip => ip !== '未知'))];
            
            document.getElementById('totalCount').textContent = registrations.length;
            document.getElementById('todayCount').textContent = todayRegs.length;
            document.getElementById('uniqueIpCount').textContent = uniqueIps.length;
        }

        function renderLogs(highlightIndex = -1) {
            const container = document.getElementById('logContainer');
            
            if (registrations.length === 0) {
                container.innerHTML = '<div class="empty">目前沒有註冊記錄</div>';
                return;
            }
            
            let html = '';
            registrations.forEach((reg, index) => {
                const isNew = index === highlightIndex;
                html += `
                    <div class="log-entry ${isNew ? 'log-new' : ''}">
                        <span class="log-time">${formatDate(reg.createdAt)}</span>
                        <span class="log-user">👤 ${reg.username}</span>
                        <span class="log-ip">🌐 ${reg.ip}</span>
                    </div>
                `;
            });
            
            container.innerHTML = html;
            container.scrollTop = 0;
        }

        async function fetchData() {
            try {
                const response = await fetch(`${apiUrl}/api/admin/registrations`);
                const data = await response.json();
                
                if (data.success) {
                    const prevLength = registrations.length;
                    registrations = data.registrations || [];
                    
                    updateStats();
                    
                    if (registrations.length > prevLength) {
                        renderLogs(0);
                    } else {
                        renderLogs();
                    }
                    
                    setOnline(true);
                } else {
                    setOnline(false);
                }
            } catch (error) {
                setOnline(false);
                document.getElementById('logContainer').innerHTML = 
                    '<div class="empty">無法連線到伺服器</div>';
            }
        }

        function setOnline(status) {
            isOnline = status;
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            
            if (status) {
                dot.classList.remove('offline');
                text.textContent = '連線正常';
            } else {
                dot.classList.add('offline');
                text.textContent = '連線中斷';
            }
        }

        fetchData();
        setInterval(fetchData, 10000);
    </script>
</body>
</html>
