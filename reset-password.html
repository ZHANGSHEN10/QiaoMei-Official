<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重設密碼 - 喬美卡巴拉島</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --accent: #f59e0b;
            --dark: #0f172a;
            --dark-light: #1e293b;
            --dark-lighter: #334155;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --success: #10b981;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 0;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
            font-weight: 900;
            text-decoration: none;
            color: var(--text);
        }

        .logo-icon {
            color: var(--accent);
            font-size: 28px;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 10px var(--accent); }
            50% { text-shadow: 0 0 30px var(--accent), 0 0 50px var(--accent); }
        }

        .reset-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .reset-box {
            background: var(--dark-light);
            border-radius: 20px;
            padding: 50px 40px;
            width: 100%;
            max-width: 500px;
            border: 1px solid var(--dark-lighter);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .reset-box::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, transparent 50%);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .reset-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 25px;
            background: var(--gradient-1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: white;
            animation: float 3s ease-in-out infinite;
            position: relative;
            z-index: 1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .reset-title {
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 15px;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            z-index: 1;
        }

        .reset-subtitle {
            color: var(--text-muted);
            margin-bottom: 35px;
            line-height: 1.6;
            position: relative;
            z-index: 1;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
            position: relative;
            z-index: 1;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-muted);
        }

        .form-group .input-icon {
            position: relative;
        }

        .form-group .input-icon i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .form-group input {
            width: 100%;
            padding: 15px 20px 15px 45px;
            border-radius: 12px;
            border: 1px solid var(--dark-lighter);
            background: var(--dark);
            color: var(--text);
            font-size: 16px;
            font-family: 'Noto Sans TC', sans-serif;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }

        .password-requirements {
            text-align: left;
            margin-bottom: 25px;
            position: relative;
            z-index: 1;
        }

        .password-requirements h4 {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 10px;
        }

        .password-requirements ul {
            list-style: none;
            padding: 0;
        }

        .password-requirements li {
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .password-requirements li i {
            font-size: 12px;
        }

        .password-requirements li.valid {
            color: var(--success);
        }

        .password-requirements li.valid i {
            color: var(--success);
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            border: none;
            background: var(--gradient-1);
            color: white;
            font-size: 18px;
            font-weight: 700;
            font-family: 'Noto Sans TC', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            position: relative;
            z-index: 1;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .success-message, .error-message {
            display: none;
            position: relative;
            z-index: 1;
        }

        .success-message.show {
            display: block;
        }

        .error-message.show {
            display: block;
        }

        .success-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 25px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            color: white;
            animation: scaleIn 0.5s ease;
        }

        @keyframes scaleIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .success-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #10b981;
        }

        .success-text {
            color: var(--text-muted);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .error-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 25px;
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
        }

        .error-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #ef4444;
        }

        .error-text {
            color: var(--text-muted);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .back-link {
            text-align: center;
            margin-top: 30px;
            color: var(--text-muted);
            position: relative;
            z-index: 1;
        }

        .back-link a {
            color: var(--primary-light);
            text-decoration: none;
            font-weight: 500;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .footer {
            background: var(--dark);
            border-top: 1px solid var(--dark-lighter);
            padding: 20px 0;
            text-align: center;
        }

        .footer-content {
            color: var(--text-muted);
            font-size: 14px;
        }

        @media (max-width: 480px) {
            .reset-box {
                padding: 30px 20px;
            }
            
            .reset-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">✦</span>
                <span>喬美卡巴拉島</span>
            </a>
        </div>
    </nav>

    <div class="reset-container">
        <div class="reset-box">
            <div id="formContent">
                <div class="reset-icon">
                    <i class="fas fa-lock"></i>
                </div>
                <h1 class="reset-title">重設密碼</h1>
                <p class="reset-subtitle">請輸入您的新密碼</p>

                <form id="resetForm">
                    <div class="form-group">
                        <label>新密碼</label>
                        <div class="input-icon">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="newPassword" name="newPassword" placeholder="請輸入新密碼" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>確認新密碼</label>
                        <div class="input-icon">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="請再次輸入新密碼" required>
                        </div>
                    </div>
                    <div class="password-requirements">
                        <h4>密碼須符合以下條件：</h4>
                        <ul>
                            <li id="req-length"><i class="fas fa-circle"></i> 至少 6 個字元</li>
                            <li id="req-match"><i class="fas fa-circle"></i> 密碼一致</li>
                        </ul>
                    </div>
                    <button type="submit" class="submit-btn">確認重設</button>
                </form>
            </div>

            <div id="successMessage" class="success-message">
                <div class="success-icon">
                    <i class="fas fa-check"></i>
                </div>
                <h2 class="success-title">密碼重設成功！</h2>
                <p class="success-text">您的密碼已成功更新<br>請使用新密碼登入</p>
                <button class="submit-btn" onclick="window.location.href='login.html'">前往登入</button>
            </div>

            <div id="errorMessage" class="error-message">
                <div class="error-icon">
                    <i class="fas fa-times"></i>
                </div>
                <h2 class="error-title">重設失敗</h2>
                <p class="error-text" id="errorText">連結已過期，請重新申請密碼重設</p>
                <button class="submit-btn" onclick="window.location.href='forgot-password.html'">重新申請</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-content">
            © 2026 喬美卡巴拉島. All Rights Reserved.
        </div>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBqJvJQD8h51R6C-A2-1XjN5zN3kPQRSTU",
            authDomain: "qiaomei-499bc.firebaseapp.com",
            projectId: "qiaomei-499bc",
            storageBucket: "qiaomei-499bc.appspot.com",
            messagingSenderId: "106221869318360290171",
            appId: "1:106221869318360290171:web:demo"
        };

        firebase.initializeApp(firebaseConfig);

        const newPasswordInput = document.getElementById('newPassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const reqLength = document.getElementById('req-length');
        const reqMatch = document.getElementById('req-match');

        function validatePassword() {
            const password = newPasswordInput.value;
            const confirm = confirmPasswordInput.value;

            if (password.length >= 6) {
                reqLength.classList.add('valid');
                reqLength.querySelector('i').classList.replace('fa-circle', 'fa-check-circle');
            } else {
                reqLength.classList.remove('valid');
                reqLength.querySelector('i').classList.replace('fa-check-circle', 'fa-circle');
            }

            if (password === confirm && password.length > 0) {
                reqMatch.classList.add('valid');
                reqMatch.querySelector('i').classList.replace('fa-circle', 'fa-check-circle');
            } else {
                reqMatch.classList.remove('valid');
                reqMatch.querySelector('i').classList.replace('fa-check-circle', 'fa-circle');
            }
        }

        newPasswordInput.addEventListener('input', validatePassword);
        confirmPasswordInput.addEventListener('input', validatePassword);

        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const newPassword = newPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            
            if (newPassword !== confirmPassword) {
                alert('密碼不一致！');
                return;
            }
            
            if (newPassword.length < 6) {
                alert('密碼至少需要6個字元！');
                return;
            }
            
            const btn = document.querySelector('.submit-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 處理中...';
            
            const urlParams = new URLSearchParams(window.location.search);
            const oobCode = urlParams.get('oobCode');
            const mode = urlParams.get('mode');
            
            if (!oobCode || mode !== 'resetPassword') {
                document.getElementById('formContent').style.display = 'none';
                document.getElementById('errorMessage').classList.add('show');
                return;
            }
            
            try {
                await firebase.auth().verifyPasswordResetCode(oobCode);
                await firebase.auth().confirmPasswordReset(oobCode, newPassword);
                
                document.getElementById('formContent').style.display = 'none';
                document.getElementById('successMessage').classList.add('show');
            } catch (error) {
                console.error('Reset error:', error);
                document.getElementById('formContent').style.display = 'none';
                document.getElementById('errorMessage').classList.add('show');
                
                if (error.code === 'auth/expired-action-code') {
                    document.getElementById('errorText').textContent = '連結已過期，請重新申請密碼重設';
                } else if (error.code === 'auth/invalid-action-code') {
                    document.getElementById('errorText').textContent = '連結無效，請重新申請密碼重設';
                } else {
                    document.getElementById('errorText').textContent = '發生錯誤，請重新嘗試';
                }
            }
            
            btn.disabled = false;
            btn.textContent = '確認重設';
        });
    </script>
</body>
</html>
